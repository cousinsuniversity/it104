<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT104 Module 1 | Summative Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .progress-container { transition: width 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="fixed top-0 left-0 w-full h-2 bg-slate-200 z-[100]">
        <div id="progressBar" class="h-full bg-blue-600 progress-container" style="width: 0%"></div>
    </div>

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-12 text-center">
            <span class="text-blue-600 font-bold tracking-widest uppercase text-sm">IT104: Lecture Assessment</span>
            <h1 class="text-4xl font-extrabold mt-2 tracking-tight">Module 1 Summative Exam</h1>
            <p class="text-slate-500 mt-4 text-lg">Foundations of App Dev & Emerging Tech</p>
        </header>

        <div id="quizContainer" class="space-y-8"></div>

        <div class="mt-12 flex justify-center pb-20">
            <button id="submitBtn" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:scale-105 active:scale-95 transition-all shadow-xl shadow-slate-200">
                Submit Assessment
            </button>
        </div>
    </div>

    <div id="resultModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="glass relative bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl text-center border border-white">
            <h2 class="text-2xl font-extrabold">Exam Completed</h2>
            <div id="finalScore" class="text-7xl font-black text-blue-600 my-6">0</div>
            <p id="feedbackText" class="text-slate-600 font-medium leading-relaxed mb-8"></p>
            <button onclick="location.reload()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-colors">
                Retake Exam
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
